---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  
  {% endfor %}
  <script data-ad-client="ca-pub-8488492752661749" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
</div>
